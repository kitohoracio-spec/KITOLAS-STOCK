<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Stock System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Stock</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('products')">Produtos</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
      <h1>Dashboard</h1>
      <div id="stats"></div>
    </div>

    <!-- PRODUTOS -->
    <div id="products" class="page" style="display:none;">
      <h1>Produtos</h1>

      <input id="name" placeholder="Nome">
      <input id="qty" type="number" placeholder="Quantidade">
      <input id="price" type="number" placeholder="Preço">
      <button onclick="addProduct()">Adicionar</button>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Qtd</th>
            <th>Preço</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="productList"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
